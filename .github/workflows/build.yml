name: Build & Release Desktop Apps

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    name: Build Linux app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libblkid-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux app
        run: flutter build linux --release

      - name: Compress Linux build
        run: |
          mkdir -p dist
          tar -czf dist/git-trace-linux.tar.gz -C build/linux/x64/release/bundle .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: git-trace-linux
          path: dist/git-trace-linux.tar.gz

  build-windows:
    name: Build Windows app
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows app
        run: flutter build windows --release

      - name: Build Installer using Inno Setup
        run: |
          iscc windows/installer.iss

      - name: Package Windows portable and installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item -Path build/windows/installer/GitTrace_Installer.exe -Destination dist/
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath dist/git-trace-windows-portable.zip

      - name: Upload Windows Installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: git-trace-windows-installer
          path: dist/GitTrace_Installer.exe

      - name: Upload Windows Portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: git-trace-windows-portable
          path: dist/git-trace-windows-portable.zip

  build-macos:
    name: Build macOS app
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS app
        run: flutter build macos --release

      - name: Compress macOS build
        run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent build/macos/Build/Products/Release/git_trace.app dist/git-trace-macos.zip

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: git-trace-macos
          path: dist/git-trace-macos.zip

  release:
    name: Create GitHub Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List downloaded files
        run: ls -la dist

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/git-trace-linux.tar.gz
            dist/GitTrace_Installer.exe
            dist/git-trace-windows-portable.zip
            dist/git-trace-macos.zip
          generate_release_notes: true
