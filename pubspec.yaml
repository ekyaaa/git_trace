name: git_trace
description: "GitTrace — Trace every commit, report every day. A Git commit visualizer & monthly report generator for interns."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # File & folder picking
  file_picker: ^8.0.3

  # Excel export
  excel: ^4.0.2

  # Local storage (jam kerja & preferensi)
  shared_preferences: ^2.2.3

  # HTTP (for future Claude API integration)
  http: ^1.2.1

  # Path utilities
  path: ^1.9.0
  path_provider: ^2.1.3

  # Intl (format tanggal Indonesia)
  intl: ^0.19.0

  # Google Fonts
  google_fonts: ^6.1.0

  # Window management (desktop)
  window_manager: ^0.3.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/app_icon.png
